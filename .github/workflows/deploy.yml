name: Deploy Chat App to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm

      - name: Install local dependencies
        run: npm ci

      - name: Build local (checks for errors)
        run: npm run build

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Sync app source to EC2
        env:
          DEPLOY_HOST: ${{ secrets.EC2_HOST }}
          DEPLOY_USER: ubuntu
          # Hardcoding the path to ensure it matches your manual fix
          APP_PATH: /var/www/chat-app 
        run: |
          set -euo pipefail
          # Using --rsync-path="sudo rsync" forces the server to accept files even if root-owned
          rsync -avz --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "node_modules" \
            --exclude "frontend/node_modules" \
            --exclude ".env" \
            -e "ssh -o StrictHostKeyChecking=accept-new" \
            --rsync-path="sudo rsync" \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:${APP_PATH}/"

      - name: Install and restart on EC2
        env:
          DEPLOY_HOST: ${{ secrets.EC2_HOST }}
          DEPLOY_USER: ubuntu
          APP_PATH: /var/www/chat-app
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=accept-new "${DEPLOY_USER}@${DEPLOY_HOST}" "
            set -euo pipefail
            cd '${APP_PATH}'

            # Install and Build
            sudo npm ci --omit=dev
            sudo npm ci --prefix frontend
            sudo npm run build --prefix frontend

            # PM2 management
            if pm2 describe mern-chat-app >/dev/null 2>&1; then
              pm2 restart mern-chat-app --update-env
            else
              # Replace with your actual backend entry point
              pm2 start backend/server.js --name mern-chat-app
            fi
            pm2 save
          "